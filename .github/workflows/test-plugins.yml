name: Test Plugins

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Discovery job - outputs plugin matrix dynamically using Makefile (single source of truth)
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
      has_changes: ${{ steps.discover.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git diff with base branch on PRs

      - name: Discover plugins with tests
        id: discover
        run: |
          # Get all plugins from Makefile (single source of truth)
          make ci-list-plugins-json > /tmp/all_plugins.json

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Get files changed in this PR
            changed=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

            # If shared config changed, run all plugins
            if echo "$changed" | grep -qE '^(\.github/workflows/test-plugins\.yml|Makefile)'; then
              echo "Shared config changed, running all plugins"
              plugins=$(cat /tmp/all_plugins.json)
              echo "has_changes=true" >> $GITHUB_OUTPUT
            else
              # Extract affected plugin names from changed paths
              affected=$(echo "$changed" | sed -n 's|^plugins/\([^/]*\)/.*|\1|p' | sort -u)

              if [ -z "$affected" ]; then
                echo "No plugin files changed, skipping tests"
                plugins="[]"
                echo "has_changes=false" >> $GITHUB_OUTPUT
              else
                # Filter all plugins to only affected ones
                plugins=$(echo "$affected" | python3 -c "import json,sys; all_plugins=json.load(open('/tmp/all_plugins.json')); affected=set(sys.stdin.read().strip().split('\n')); print(json.dumps([p for p in all_plugins if p in affected]))")
                echo "has_changes=true" >> $GITHUB_OUTPUT
              fi
            fi
          else
            # On push to master, run all plugins
            plugins=$(cat /tmp/all_plugins.json)
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          echo "plugins=$plugins" >> $GITHUB_OUTPUT
          echo "Discovered plugins: $plugins"

  # Test each plugin in parallel
  test:
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e plugins/${{ matrix.plugin }}

      - name: Run unit tests for ${{ matrix.plugin }}
        run: |
          pytest plugins/${{ matrix.plugin }}/tests -v -m "not slow" --timeout=30

  # Integration tests (only on master push, with API keys)
  integration-tests:
    needs: discover
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e plugins/${{ matrix.plugin }}

      - name: Run integration tests for ${{ matrix.plugin }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -d "plugins/${{ matrix.plugin }}/tests/integration" ]; then
            pytest plugins/${{ matrix.plugin }}/tests/integration -v --timeout=120
          else
            echo "No integration tests found for ${{ matrix.plugin }}"
          fi

  # Coverage report (combined for all plugins)
  coverage:
    needs: discover
    if: needs.discover.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          # Install all plugins
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ]; then
              pip install -e "$plugin"
            fi
          done

      - name: Run coverage
        run: |
          # Find all plugins with tests and run coverage
          for plugin in plugins/*/; do
            if [ -d "$plugin/tests" ]; then
              pytest "$plugin/tests" -v -m "not slow" --cov="$plugin" --cov-append --cov-report=xml --cov-report=term --timeout=30 || true
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-plugins
