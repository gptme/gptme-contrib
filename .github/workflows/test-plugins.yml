name: Test Plugins

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Detect which paths changed to skip expensive jobs on unrelated PRs
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      plugins: ${{ steps.filter.outputs.plugins }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          plugins:
            - 'plugins/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - 'Makefile'
            - '.github/workflows/test-plugins.yml'

  # Discovery job - outputs plugin matrix dynamically using Makefile (single source of truth)
  # On PRs, filters the matrix to only plugins with actual file changes
  discover:
    needs: changes
    # Always run on push to master; on PRs, only when plugin code changed
    if: github.event_name == 'push' || needs.changes.outputs.plugins == 'true'
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for git diff against base branch on PRs

      - name: Discover plugins with tests
        id: discover
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Get all plugins from Makefile (single source of truth)
          make ci-list-plugins-json > /tmp/all_plugins.json

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Get files changed in this PR (use env var to avoid shell injection)
            changed=$(git diff --name-only "origin/${BASE_REF}...HEAD")

            # If shared config changed, run all plugins (can't tell which are affected)
            if echo "$changed" | grep -qE '^(Makefile|pyproject\.toml|uv\.lock|\.github/workflows/test-plugins\.yml)'; then
              echo "Shared config changed, running all plugins"
              plugins=$(cat /tmp/all_plugins.json)
            else
              # Files directly under plugins/ (not in a subdirectory) also trigger full run
              if echo "$changed" | grep -qE '^plugins/[^/]+$'; then
                echo "Root-level plugins/ file changed, running all plugins"
                plugins=$(cat /tmp/all_plugins.json)
              else
                # Extract affected plugin names from changed paths (plugins/<name>/...)
                affected=$(echo "$changed" | sed -n 's|^plugins/\([^/]*\)/.*|\1|p' | sort -u)

                if [ -z "$affected" ]; then
                  echo "No plugin files changed, skipping tests"
                  plugins="[]"
                else
                  # Filter all plugins to only affected ones
                  plugins=$(echo "$affected" | python3 -c "import json,sys; all_plugins=json.load(open('/tmp/all_plugins.json')); affected=set(sys.stdin.read().strip().split('\n')); print(json.dumps([p for p in all_plugins if p in affected]))")
                fi
              fi
            fi
          else
            # On push to master, run all plugins
            plugins=$(cat /tmp/all_plugins.json)
          fi

          echo "plugins=$plugins" >> $GITHUB_OUTPUT
          echo "Discovered plugins: $plugins"

  # Test each plugin in parallel
  test:
    needs: discover
    if: needs.discover.result == 'success' && needs.discover.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          pip install -e plugins/${{ matrix.plugin }}

      - name: Run unit tests for ${{ matrix.plugin }}
        run: |
          pytest plugins/${{ matrix.plugin }}/tests -v -m "not slow" --timeout=30

  # Integration tests (only on master push, with API keys)
  integration-tests:
    needs: discover
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && needs.discover.result == 'success' && needs.discover.outputs.plugins != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-timeout
          pip install -e plugins/${{ matrix.plugin }}

      - name: Run integration tests for ${{ matrix.plugin }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          if [ -d "plugins/${{ matrix.plugin }}/tests/integration" ]; then
            pytest plugins/${{ matrix.plugin }}/tests/integration -v --timeout=120
          else
            echo "No integration tests found for ${{ matrix.plugin }}"
          fi

  # Coverage report (combined for all plugins)
  coverage:
    needs: changes
    # Always run on push to master; on PRs, only when plugin code changed
    if: github.event_name == 'push' || needs.changes.outputs.plugins == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-timeout
          # Install all plugins
          for plugin in plugins/*/; do
            if [ -f "$plugin/pyproject.toml" ]; then
              pip install -e "$plugin"
            fi
          done

      - name: Run coverage
        run: |
          # Find all plugins with tests and run coverage
          for plugin in plugins/*/; do
            if [ -d "$plugin/tests" ]; then
              pytest "$plugin/tests" -v -m "not slow" --cov="$plugin" --cov-append --cov-report=xml --cov-report=term --timeout=30 || true
            fi
          done

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-plugins
