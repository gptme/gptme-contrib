name: Deploy Dashboard

on:
  push:
    branches: [master]
    paths:
      - 'lessons/**'
      - 'plugins/**'
      - 'packages/**'
      - 'skills/**'
      - 'gptme.toml'
      - 'packages/gptme-dashboard/**'
      - '.github/workflows/dashboard.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install gptme-dashboard
        run: uv pip install --system -e packages/gptme-dashboard

      - name: Build dashboard
        run: gptme-dashboard --workspace . --output _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
