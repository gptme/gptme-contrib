[project]
name = "gptwitter"
version = "0.1.0"
description = "Twitter/X integration for gptme agents"
authors = [
    {name = "gptme contributors", email = "gptme@superuserlabs.org"}
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["twitter", "x", "gptme", "ai-agents", "automation"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Communications",
    "Topic :: Utilities",
]
dependencies = [
    "click>=8.0",
    "python-dotenv>=1.0",
    "rich>=13.0",
    "tweepy>=4.14.0",
    "gptmail[oauth]",
]

[project.urls]
Homepage = "https://github.com/gptme/gptme-contrib"
Repository = "https://github.com/gptme/gptme-contrib"
Issues = "https://github.com/gptme/gptme-contrib/issues"

[project.scripts]
gptwitter = "gptwitter.cli:main"
gptme-twitter = "gptwitter.cli:main"

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
    "mypy>=1.0",
    "ruff>=0.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gptwitter"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
