[project]
name = "gptme-rag"
version = "0.5.1"
description = "ChromaDB-based RAG (Retrieval-Augmented Generation) for gptme agents"
authors = [
    {name = "gptme contributors", email = "gptme@superuserlabs.org"}
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10,<3.13"
keywords = ["rag", "gptme", "chromadb", "embeddings", "semantic-search", "context-management"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing :: General",
]
dependencies = [
    "chromadb>=1.0",
    "click",
    "rich",
    "tiktoken>=0.7",
    "watchdog>=3.0.0",
    "psutil>=6.1.0",
    "tqdm>=4.67.1",
    "sentence-transformers>=3.3.1",
]

[project.urls]
Homepage = "https://github.com/gptme/gptme-contrib"
Repository = "https://github.com/gptme/gptme-contrib"
Issues = "https://github.com/gptme/gptme-contrib/issues"

[project.optional-dependencies]
dev = [
    "mypy>=1.0.0",
    "pytest>=7.0",
    "pytest-cov>=4.0",
]
mcp = ["mcp>=1.0,<2.0"]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.scripts]
gptme-rag = "gptme_rag.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gptme_rag"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "B", "UP"]
ignore = ["E402", "E501", "B905"]

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
markers = [
    "slow: tests that load the embedding model and build a real index (~30s)",
]
