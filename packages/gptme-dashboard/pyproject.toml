[project]
name = "gptme-dashboard"
version = "0.1.0"
description = "Static dashboard generator for gptme workspaces"
authors = [
    {name = "gptme contributors", email = "gptme@superuserlabs.org"}
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.10"
keywords = ["dashboard", "gptme", "ai-agents", "static-site"]
dependencies = [
    "click>=8.0",
    "jinja2>=3.0",
    "markdown>=3.4",
    "pygments>=2.0",
    "pyyaml>=6.0",
    "tomli>=1.2; python_version < '3.11'",
]

[project.urls]
Homepage = "https://github.com/gptme/gptme-contrib"
Repository = "https://github.com/gptme/gptme-contrib"
Issues = "https://github.com/gptme/gptme-contrib/issues"

[project.optional-dependencies]
sessions = [
    "gptme-sessions",
]
dev = [
    "mypy>=1.0.0",
    "pytest>=7.0",
    "gptme-sessions",
]
test = [
    "pytest>=7.0",
    "gptme-sessions",
]

[project.scripts]
gptme-dashboard = "gptme_dashboard.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/gptme_dashboard"]

[tool.hatch.build]
include = [
    "src/gptme_dashboard/**",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
python_version = "3.10"
check_untyped_defs = true
warn_return_any = true
warn_unused_configs = true
