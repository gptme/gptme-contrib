<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}gptme workspace{% endblock %}</title>
<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --text-dim: #8b949e;
  --accent: #58a6ff;
  --accent-dim: #388bfd26;
  --green: #3fb950;
  --purple: #bc8cff;
  --orange: #d29922;
  --cyan: #39d2c0;
  --code-bg: #1c2128;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

header {
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.5rem;
  margin-bottom: 2rem;
}

/* Tags */
.tag {
  display: inline-block;
  font-size: 0.75rem;
  padding: 0.15em 0.5em;
  border-radius: 999px;
  border: 1px solid var(--border);
  color: var(--text-dim);
  margin: 0.1em;
}
.tag-active { border-color: var(--green); color: var(--green); }
.tag-deprecated { border-color: var(--orange); color: var(--orange); }
.tag-category { border-color: var(--purple); color: var(--purple); }

footer {
  border-top: 1px solid var(--border);
  padding-top: 1rem;
  margin-top: 2rem;
  color: var(--text-dim);
  font-size: 0.8rem;
  text-align: center;
}

{% block extra_style %}{% endblock %}
</style>
</head>
<body>
<div class="container">

{% block content %}{% endblock %}

<footer>
  Generated by <a href="https://gptme.org">gptme</a> dashboard &mdash; <a href="https://github.com/gptme/gptme-contrib">gptme-contrib</a>
</footer>

</div>
{% block scripts %}{% endblock %}
</body>
</html>
