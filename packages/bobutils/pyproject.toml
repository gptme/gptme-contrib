[project]
name = "bobutils"
version = "0.1.0"
description = "Shared workspace utilities for gptme agents (stdlib-only)"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
test = [
    "pytest>=7.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/bobutils"]
